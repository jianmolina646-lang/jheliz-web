{% load humanize %}
<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <title>{{ SITE_NAME }}</title>
</head>
<body style="margin:0;padding:0;background:#0b0217;font-family:Arial,Helvetica,sans-serif;color:#eae1ff;">
  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background:#0b0217;">
    <tr><td align="center" style="padding:24px 12px;">
      <table role="presentation" width="600" cellpadding="0" cellspacing="0" style="max-width:600px;background:#17082b;border:1px solid rgba(255,255,255,0.06);border-radius:16px;overflow:hidden;">
        <tr><td style="padding:24px 24px 0 24px;">
          <div style="font-size:22px;font-weight:700;color:#f472b6;">{{ SITE_NAME }}</div>
          <div style="font-size:12px;color:rgba(255,255,255,0.6);margin-top:4px;">Streaming y licencias para Perú</div>
        </td></tr>
        <tr><td style="padding:24px;color:#eae1ff;font-size:15px;line-height:1.6;">
          {% block body %}{% endblock %}
        </td></tr>
        <tr><td style="padding:16px 24px;border-top:1px solid rgba(255,255,255,0.06);color:rgba(255,255,255,0.55);font-size:12px;">
          ¿Necesitas ayuda? Escríbenos por WhatsApp: {{ WHATSAPP_NUMBER }}<br>
          <a href="{{ SITE_URL }}" style="color:#f472b6;text-decoration:none;">{{ SITE_URL }}</a>
        </td></tr>
      </table>
    </td></tr>
  </table>
</body>
</html>
