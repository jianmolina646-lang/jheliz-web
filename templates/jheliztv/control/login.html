{% load static %}<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Ingresar · Control jheliztv</title>
  <meta name="robots" content="noindex,nofollow">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=swap">
  <style>
    *{box-sizing:border-box;}
    body{margin:0;background:#f3f4f6;font-family:'Inter',system-ui,-apple-system,Segoe UI,Roboto,sans-serif;}
    .lg-wrap{max-width:440px;margin:48px auto 60px;padding:0 18px;}
    .lg-card{background:linear-gradient(160deg,#10b981 0%,#059669 55%,#047857 100%);
      border-radius:26px;padding:36px 30px 30px;color:#fff;position:relative;overflow:hidden;
      box-shadow:0 30px 70px -34px rgba(6,78,59,.7);}
    .lg-card::before{content:"";position:absolute;inset:0;
      background:radial-gradient(420px 200px at 80% 0%,rgba(255,255,255,.16),transparent 60%);}
    .lg-logo{width:96px;height:96px;border-radius:26px;margin:0 auto;position:relative;z-index:1;
      background:linear-gradient(145deg,#34d399,#059669);
      box-shadow:0 14px 30px rgba(4,40,30,.45),inset 0 2px 4px rgba(255,255,255,.4);
      display:flex;align-items:center;justify-content:center;}
    .lg-brand{text-align:center;font-size:23px;font-weight:800;letter-spacing:.4px;margin:18px 0 4px;position:relative;z-index:1;}
    .lg-tag{text-align:center;color:#d1fae5;font-size:12.5px;margin-bottom:26px;position:relative;z-index:1;}
    .lg-field{margin-bottom:14px;position:relative;z-index:1;}
    .lg-field label{display:block;font-size:12.5px;font-weight:700;color:#ecfdf5;margin:0 4px 7px;}
    .lg-input{background:#fff;border-radius:14px;height:50px;display:flex;align-items:center;
      padding:0 14px;gap:10px;box-shadow:0 8px 18px rgba(4,40,30,.18);}
    .lg-input .material-symbols-outlined{font-size:20px;color:#9ca3af;}
    .lg-input input{border:0;outline:0;flex:1;font-size:15px;color:#111827;background:transparent;}
    .lg-input input::placeholder{color:#9ca3af;}
    .lg-btn{width:100%;height:52px;margin-top:8px;border:0;border-radius:14px;cursor:pointer;
      background:#063d2c;color:#fff;font-size:16px;font-weight:800;letter-spacing:.3px;
      box-shadow:0 12px 24px rgba(3,30,22,.4);display:flex;align-items:center;justify-content:center;gap:8px;
      position:relative;z-index:1;}
    .lg-btn:hover{filter:brightness(1.08);}
    .lg-sec{text-align:center;color:#d1fae5;font-size:11.5px;margin-top:18px;position:relative;z-index:1;
      display:flex;align-items:center;justify-content:center;gap:6px;}
    .lg-sec .material-symbols-outlined{font-size:15px;}
    .lg-msg{border-radius:12px;padding:11px 14px;font-size:13.5px;font-weight:600;margin-bottom:14px;position:relative;z-index:1;}
    .lg-msg--error,.lg-msg--danger{background:#fee2e2;color:#991b1b;}
    .lg-msg--success{background:#d1fae5;color:#065f46;}
    .lg-msg--warning{background:#fef3c7;color:#92400e;}
  </style>
</head>
<body>
<div class="lg-wrap">
  <div class="lg-card">
    <div class="lg-logo">
      <svg viewBox="0 0 62 62" width="58" height="58" aria-hidden="true">
        <path d="M14 8 L52 31 L14 54 Z" fill="rgba(255,255,255,.18)"/>
        <text x="29" y="40" text-anchor="middle" font-family="Inter,Segoe UI,sans-serif"
          font-size="29" font-weight="800" fill="#ffffff" letter-spacing="-3">JC</text>
      </svg>
    </div>
    <div class="lg-brand">Control jheliztv.xyz</div>
    <div class="lg-tag">Panel del dueño · solo administrador</div>

    {% if messages %}
      {% for m in messages %}
        <div class="lg-msg lg-msg--{{ m.tags }}">{{ m }}</div>
      {% endfor %}
    {% endif %}

    <form method="post" action="{% url 'jheliztv_control_login' %}">
      {% csrf_token %}
      <div class="lg-field">
        <label>Usuario</label>
        <div class="lg-input">
          <span class="material-symbols-outlined">person</span>
          <input type="text" name="username" value="{{ username|default:'' }}" placeholder="Tu usuario admin"
                 required autofocus autocomplete="username">
        </div>
      </div>
      <div class="lg-field">
        <label>Contraseña</label>
        <div class="lg-input">
          <span class="material-symbols-outlined">lock</span>
          <input type="password" name="password" placeholder="Tu contraseña"
                 required autocomplete="current-password">
        </div>
      </div>
      <button type="submit" class="lg-btn">Entrar al control <span class="material-symbols-outlined">arrow_forward</span></button>
    </form>

    <div class="lg-sec"><span class="material-symbols-outlined">verified_user</span> Acceso restringido al administrador</div>
  </div>
</div>
</body>
</html>
