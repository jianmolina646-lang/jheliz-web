{% load static %}<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ title|default:"Control jheliztv" }} · Panel del dueño</title>
  <meta name="robots" content="noindex,nofollow">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=swap">
  <link rel="stylesheet" href="{% static 'css/jheliz-control.css' %}">
  <style>
    body{margin:0;background:#f3f4f6;font-family:'Inter',system-ui,-apple-system,Segoe UI,Roboto,sans-serif;}
    .jc{max-width:1180px;margin:0 auto;padding:0 14px 48px;}
  </style>
</head>
<body>
<div class="jc">
  <header class="jc-topbar">
    <a class="jc-brand" href="{% url 'jheliztv_control_dashboard' %}">
      <span class="jc-logo" aria-hidden="true">
        <svg viewBox="0 0 64 64" width="36" height="36">
          <defs><linearGradient id="jcLogoBar" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0" stop-color="#34d399"/><stop offset="1" stop-color="#059669"/></linearGradient></defs>
          <rect x="2" y="2" width="60" height="60" rx="18" fill="url(#jcLogoBar)"/>
          <path d="M17 13 L51 32 L17 51 Z" fill="rgba(255,255,255,.16)"/>
          <text x="32" y="42" text-anchor="middle" font-family="Inter,Segoe UI,sans-serif"
            font-size="29" font-weight="800" fill="#ffffff" letter-spacing="-2">JC</text>
        </svg>
      </span>
      <span class="jc-brand__txt">
        <strong>Control jheliztv.xyz</strong>
        <small>Panel del dueño</small>
      </span>
    </a>
    <div class="jc-topbar__actions">
      <a class="jc-btn jc-btn--ghost jc-btn--sm" href="{% url 'jheliztv_control_logout' %}">
        <span class="material-symbols-outlined">logout</span> Salir
      </a>
    </div>
  </header>

  {% if messages %}
    <div class="jc-msgs">
      {% for m in messages %}
        <div class="jc-msg jc-msg--{{ m.tags }}">{{ m }}</div>
      {% endfor %}
    </div>
  {% endif %}

  <main class="jc-main jc-fade">
    {% block jc_content %}{% endblock %}
  </main>
</div>
</body>
</html>
