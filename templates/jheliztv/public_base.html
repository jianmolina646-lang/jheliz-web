{% load static i18n %}<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ title|default:"JHELIZCONTROLTV" }}</title>
  <meta name="description" content="JHELIZCONTROLTV — sistema de gestión de suscripciones: clientes, vencimientos y ganancias en un solo lugar.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=swap">
  <link rel="stylesheet" href="{% static 'css/jheliz-control.css' %}">
  <style>
    *{box-sizing:border-box;}
    body{margin:0;background:#f3f4f6;color:#1f2937;font-family:'Inter',system-ui,-apple-system,Segoe UI,Roboto,sans-serif;}
    .pb-nav{max-width:1100px;margin:0 auto;padding:16px 18px;display:flex;align-items:center;justify-content:space-between;gap:12px;}
    .pb-brand{display:flex;align-items:center;gap:10px;text-decoration:none;color:#065f46;}
    .pb-brand strong{font-size:18px;font-weight:800;letter-spacing:-.3px;}
    .pb-brand small{display:block;color:#6b7280;font-weight:500;font-size:11.5px;}
    .pb-btn{display:inline-flex;align-items:center;gap:6px;border:none;border-radius:12px;padding:11px 18px;
      font-weight:700;font-size:14px;cursor:pointer;text-decoration:none;transition:.15s;}
    .pb-btn--primary{background:linear-gradient(135deg,#10b981,#059669);color:#fff;box-shadow:0 12px 26px -14px rgba(6,95,70,.8);}
    .pb-btn--primary:hover{filter:brightness(1.05);}
    .pb-btn--ghost{background:#fff;color:#065f46;border:1.5px solid #d1fae5;}
    .pb-wrap{max-width:1100px;margin:0 auto;padding:0 18px;}
    .pb-card{background:#fff;border:1px solid #e5e7eb;border-radius:20px;box-shadow:0 24px 60px -34px rgba(6,78,59,.45);}
    .pb-msgs{max-width:460px;margin:0 auto 14px;}
    .pb-msg{border-radius:12px;padding:11px 14px;font-size:13.5px;font-weight:500;margin-bottom:8px;}
    .pb-msg--error,.pb-msg--danger{background:#fee2e2;color:#991b1b;}
    .pb-msg--success{background:#d1fae5;color:#065f46;}
    .pb-msg--warning{background:#fef3c7;color:#92400e;}
    .pb-msg--info{background:#e0f2fe;color:#075985;}
    .pb-field{margin-bottom:14px;}
    .pb-field label{display:block;font-size:13px;font-weight:600;color:#374151;margin-bottom:6px;}
    .pb-field input{width:100%;padding:12px 13px;border:1.5px solid #e5e7eb;border-radius:12px;font-size:15px;outline:none;background:#fff;}
    .pb-field input:focus{border-color:#10b981;box-shadow:0 0 0 3px #d1fae5;}
    .pb-foot{text-align:center;color:#6b7280;font-size:13px;margin-top:16px;}
    .pb-foot a{color:#059669;font-weight:700;text-decoration:none;}
  </style>
</head>
<body>
  <header class="pb-nav">
    <a class="pb-brand" href="{% url 'jheliztv_landing' %}">
      <svg viewBox="0 0 64 64" width="40" height="40" aria-hidden="true">
        <defs><linearGradient id="jcLogoNav" x1="0" y1="0" x2="1" y2="1">
          <stop offset="0" stop-color="#34d399"/><stop offset="1" stop-color="#059669"/></linearGradient></defs>
        <rect x="2" y="2" width="60" height="60" rx="18" fill="url(#jcLogoNav)"/>
        <path d="M17 13 L51 32 L17 51 Z" fill="rgba(255,255,255,.16)"/>
        <text x="32" y="42" text-anchor="middle" font-family="Inter,Segoe UI,sans-serif" font-size="29" font-weight="800" fill="#fff" letter-spacing="-2">JC</text>
      </svg>
      <span><strong>JHELIZCONTROLTV</strong><small>Gestión de suscripciones</small></span>
    </a>
    <nav style="display:flex;gap:8px;">
      {% block pb_nav_actions %}
        <a class="pb-btn pb-btn--ghost" href="{% url 'jheliztv_login' %}">Ingresar</a>
        <a class="pb-btn pb-btn--primary" href="{% url 'jheliztv_register' %}">Probar ahora</a>
      {% endblock %}
    </nav>
  </header>

  {% if messages %}
    <div class="pb-wrap"><div class="pb-msgs">
      {% for m in messages %}<div class="pb-msg pb-msg--{{ m.tags }}">{{ m }}</div>{% endfor %}
    </div></div>
  {% endif %}

  {% block pb_content %}{% endblock %}
</body>
</html>
