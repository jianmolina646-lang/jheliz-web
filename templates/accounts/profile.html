{% extends "base.html" %}
{% block title %}Mi perfil — {{ SITE_NAME }}{% endblock %}
{% block content %}
<div class="max-w-xl card-glass rounded-3xl p-8">
  <h1 class="font-display text-3xl md:text-5xl font-extrabold tracking-tight" style="letter-spacing:-0.04em;line-height:.96">Mi <span class="hero-italic text-zinc-300">perfil</span></h1>
  <form method="post" class="mt-6 space-y-4">
    {% csrf_token %}
    {% for field in form %}
      <div>
        <label class="text-xs uppercase tracking-wider text-white/60">{{ field.label }}</label>
        {{ field }}
        {% if field.errors %}<p class="text-xs text-rose-300 mt-1">{{ field.errors.0 }}</p>{% endif %}
      </div>
    {% endfor %}
    <button type="submit" class="btn-primary text-white font-semibold px-5 py-3 rounded-xl">Guardar</button>
  </form>
</div>
{% endblock %}
