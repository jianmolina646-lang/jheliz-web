{# Logos oficiales de métodos de pago — SVG inline, sin dependencias externas. #}

<span class="tb-pay-logo" aria-label="Yape" title="Yape · pago por QR">
  <svg viewBox="0 0 84 26" width="56" height="18" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
    <rect width="84" height="26" rx="5" fill="#5b2bda"/>

  </svg>
</span>
