{% load static %}
{# Navegación inferior móvil — visible solo < md (<768px) #}
<nav class="mobile-bottom-nav" aria-label="Navegación principal">
  <a href="{% url 'catalog:home' %}" class="mbn-item {% if request.resolver_match.url_name == 'home' %}is-active{% endif %}">
    <svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M3 12l9-9 9 9"/><path d="M5 10v10h14V10"/></svg>
    <span>Inicio</span>
  </a>
  <a href="{% url 'catalog:products' %}" class="mbn-item {% if request.resolver_match.url_name == 'products' or request.resolver_match.url_name == 'category' %}is-active{% endif %}">
    <svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></svg>
    <span>Catálogo</span>
  </a>
  <a href="{% url 'code_create' %}" class="mbn-item {% if request.resolver_match.url_name == 'code_create' or request.resolver_match.url_name == 'code_status' %}is-active{% endif %}">
    <svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M4 4h16v16H4z"/><path d="M4 4l8 8 8-8"/></svg>
    <span>Códigos</span>
  </a>
  <a href="{% url 'orders:cart' %}" class="mbn-item {% if request.resolver_match.url_name == 'cart' or request.resolver_match.url_name == 'checkout' %}is-active{% endif %}">
    <svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
    <span>Carrito</span>
    {% if cart_count %}<span class="mbn-badge">{{ cart_count }}</span>{% endif %}
  </a>
  {% if user.is_authenticated %}
    <a href="{% url 'accounts:dashboard' %}" class="mbn-item {% if request.resolver_match.url_name == 'dashboard' or request.resolver_match.url_name == 'profile' %}is-active{% endif %}">
      <svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      <span>Cuenta</span>
    </a>
  {% else %}
    <a href="{% url 'accounts:login' %}" class="mbn-item {% if request.resolver_match.url_name == 'login' or request.resolver_match.url_name == 'signup' %}is-active{% endif %}">
      <svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      <span>Ingresar</span>
    </a>
  {% endif %}
</nav>
