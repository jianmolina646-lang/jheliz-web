{% load static %}
{# Navegación inferior móvil — visible solo < md (<768px) #}
<nav class="mobile-bottom-nav" aria-label="Navegación principal">
  <a href="{% url 'catalog:home' %}"
     class="mbn-item {% if request.resolver_match.url_name == 'home' %}is-active{% endif %}"
     aria-label="Inicio">
    <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <path d="M3.5 11.2 12 4l8.5 7.2"/>
      <path d="M5.5 10v9.5a1 1 0 0 0 1 1H10v-5.2a1 1 0 0 1 1-1h2a1 1 0 0 1 1 1v5.2h3.5a1 1 0 0 0 1-1V10"/>
    </svg>
    <span>Inicio</span>
  </a>

  <a href="{% url 'catalog:products' %}"
     class="mbn-item {% if request.resolver_match.url_name == 'products' or request.resolver_match.url_name == 'category' %}is-active{% endif %}"
     aria-label="Catálogo">
    <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <rect x="3.5" y="3.5" width="7.2" height="7.2" rx="2"/>
      <rect x="13.3" y="3.5" width="7.2" height="7.2" rx="2"/>
      <rect x="3.5" y="13.3" width="7.2" height="7.2" rx="2"/>
      <rect x="13.3" y="13.3" width="7.2" height="7.2" rx="2"/>
    </svg>
    <span>Catálogo</span>
  </a>

  <a href="{% url 'code_create' %}"
     class="mbn-item {% if request.resolver_match.url_name == 'code_create' or request.resolver_match.url_name == 'code_status' %}is-active{% endif %}"
     aria-label="Códigos">
    <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <rect x="3" y="6" width="18" height="13" rx="2.5"/>
      <path d="M7 10v5"/>
      <path d="M11 10v5"/>
      <path d="M14 10v5"/>
      <path d="M17 10v5"/>
    </svg>
    <span>Códigos</span>
  </a>

  <a href="{% url 'orders:cart' %}"
     class="mbn-item {% if request.resolver_match.url_name == 'cart' or request.resolver_match.url_name == 'checkout' %}is-active{% endif %}"
     aria-label="Carrito{% if cart_count %} · {{ cart_count }} ítems{% endif %}">
    <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <path d="M5 6h15l-1.6 9.4a2 2 0 0 1-2 1.6H9a2 2 0 0 1-2-1.6L5 4H2.5"/>
      <circle cx="10" cy="20" r="1.4"/>
      <circle cx="17.5" cy="20" r="1.4"/>
    </svg>
    <span>Carrito</span>
    {% if cart_count %}<span class="mbn-badge">{{ cart_count }}</span>{% endif %}
  </a>

  {% if user.is_authenticated %}
    <a href="{% url 'accounts:dashboard' %}"
       class="mbn-item {% if request.resolver_match.url_name == 'dashboard' or request.resolver_match.url_name == 'profile' %}is-active{% endif %}"
       aria-label="Mi cuenta">
      <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <circle cx="12" cy="8" r="3.6"/>
        <path d="M4.5 20c1.2-3.5 4.2-5.4 7.5-5.4s6.3 1.9 7.5 5.4"/>
      </svg>
      <span>Cuenta</span>
    </a>
  {% else %}
    <a href="{% url 'accounts:login' %}"
       class="mbn-item {% if request.resolver_match.url_name == 'login' or request.resolver_match.url_name == 'signup' %}is-active{% endif %}"
       aria-label="Ingresar">
      <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M14 4h4a2 2 0 0 1 2 2v12a2 2 0 0 1-2 2h-4"/>
        <path d="M10 17l5-5-5-5"/>
        <path d="M15 12H3"/>
      </svg>
      <span>Ingresar</span>
    </a>
  {% endif %}
</nav>
