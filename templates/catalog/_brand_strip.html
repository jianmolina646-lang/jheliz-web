{# Carrusel de marcas — logos oficiales de las plataformas que vendemos. #}
{# Los SVG son simplificaciones inline (sin dependencias externas) usando #}
{# las formas/colores oficiales de cada plataforma. #}
<section aria-label="Plataformas que vendemos" class="py-8 border-y hairline overflow-hidden">
  <p class="text-center text-[11px] font-semibold tracking-[0.2em] uppercase text-zinc-500 mb-5">
    Cuentas oficiales de las plataformas más populares
  </p>
  <div class="brand-strip relative">
    <div class="brand-track flex items-center gap-12 md:gap-16 whitespace-nowrap"
         style="animation: brandTicker 38s linear infinite;">
      {% for _ in "12" %}
        <span class="brand-logo netflix" aria-label="Netflix">
          <svg viewBox="0 0 1024 276.74" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <path fill="#E50914" d="M140.803 258.904c-15.404 2.705-31.079 3.516-47.294 5.676l-49.458-144.856V270.5c-15.404 1.621-29.457 3.783-44.051 5.945V0h41.08l56.212 156.99V0h43.511zm85.131-157.798c16.757 0 42.431-.811 57.835-.811v43.24c-19.189 0-41.619 0-57.835.812v64.322c25.405-1.621 50.809-3.785 76.482-4.596v41.617l-119.724 9.461V0h119.724v43.241h-76.482zm237.284-57.865h-44.862V242.15c-14.594 0-29.188 0-43.241.539V43.241h-44.862V0H463.218zM614.292 94.382h59.187v43.241h-59.187v98.646h-42.431V0h120.808v43.241h-78.377zm148.36 103.512c24.594.539 49.456 2.434 73.51 3.783v42.701c-38.646-2.434-77.293-4.864-116.75-5.676V0h43.24zm109.994 49.457c13.783.812 28.377 1.623 42.43 3.242V0h-42.43zM1024 0l-54.863 131.591L1024 276.74c-16.215-2.162-32.43-5.135-48.646-7.838l-31.078-79.94-31.617 73.45c-15.676-2.703-30.81-3.514-46.484-5.676l55.672-126.725L871.43 0h46.482l28.377 72.91L976.673 0z"/>
          </svg>
        </span>
        <span class="brand-logo" aria-label="Disney+">
          <svg viewBox="0 0 256 30" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <text x="0" y="24" font-family="Inter, sans-serif" font-size="26" font-weight="800" fill="#0072d2" letter-spacing="-1">Disney</text>
            <text x="100" y="24" font-family="Inter, sans-serif" font-size="26" font-weight="800" fill="#0072d2">+</text>
          </svg>
        </span>
        <span class="brand-logo" aria-label="Spotify">
          <svg viewBox="0 0 168 168" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <circle cx="84" cy="84" r="84" fill="#1DB954"/>
            <path fill="#000" d="M120.6 121.4a5.2 5.2 0 0 1-7.2 1.7c-19.7-12-44.5-14.7-73.7-8a5.2 5.2 0 1 1-2.3-10.2c31.9-7.3 59.3-4.2 81.5 9.3a5.2 5.2 0 0 1 1.7 7.2zm9.7-21.7a6.6 6.6 0 0 1-9 2.1C98.7 87.9 64 84.6 36.6 92.9a6.6 6.6 0 1 1-3.8-12.6c31.4-9.5 69.7-5.8 96 10.4a6.6 6.6 0 0 1 2.1 9zm.8-22.6c-27-16-71.4-17.5-97.2-9.6a7.9 7.9 0 1 1-4.6-15.1c29.6-9 78.7-7.2 109.7 11.2a7.9 7.9 0 0 1-7.9 13.5z"/>
          </svg>
        </span>
        <span class="brand-logo" aria-label="Prime Video">
          <svg viewBox="0 0 200 30" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <text x="0" y="24" font-family="Inter, sans-serif" font-size="22" font-weight="700" fill="#00A8E1">prime</text>
            <text x="68" y="24" font-family="Inter, sans-serif" font-size="22" font-weight="500" fill="#FFFFFF">video</text>
            <path d="M0 28 Q 100 38 200 26" stroke="#FF9900" stroke-width="2" fill="none"/>
          </svg>
        </span>
        <span class="brand-logo" aria-label="Max (HBO Max)">
          <svg viewBox="0 0 80 30" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <text x="0" y="26" font-family="Inter, sans-serif" font-size="32" font-weight="900" fill="#FFFFFF" letter-spacing="-2">max</text>
          </svg>
        </span>
        <span class="brand-logo" aria-label="YouTube Premium">
          <svg viewBox="0 0 90 28" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <rect width="28" height="20" x="0" y="4" rx="5" fill="#FF0000"/>
            <polygon points="11,9 11,19 19,14" fill="#FFF"/>
            <text x="32" y="20" font-family="Inter, sans-serif" font-size="14" font-weight="700" fill="#FFFFFF">Premium</text>
          </svg>
        </span>
        <span class="brand-logo" aria-label="Crunchyroll">
          <svg viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <circle cx="16" cy="16" r="14" fill="#F47521"/>
            <circle cx="20" cy="16" r="9" fill="#0b0217"/>
            <circle cx="22" cy="14" r="2.5" fill="#F47521"/>
          </svg>
        </span>
        <span class="brand-logo" aria-label="Apple TV+">
          <svg viewBox="0 0 80 30" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <text x="0" y="22" font-family="Inter, sans-serif" font-size="20" font-weight="700" fill="#FFFFFF"></text>
            <text x="14" y="22" font-family="Inter, sans-serif" font-size="20" font-weight="700" fill="#FFFFFF">tv</text>
            <text x="40" y="22" font-family="Inter, sans-serif" font-size="20" font-weight="700" fill="#FFFFFF">+</text>
          </svg>
        </span>
        <span class="brand-logo" aria-label="Office 365">
          <svg viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <path d="M19 4 L7 8 V24 L19 28 L29 25 V7 Z" fill="#D83B01"/>
            <path d="M19 4 V28 L29 25 V7 Z" fill="#EB6C1C"/>
          </svg>
        </span>
        <span class="brand-logo" aria-label="Windows">
          <svg viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <rect x="2" y="2" width="13" height="13" fill="#F35325"/>
            <rect x="17" y="2" width="13" height="13" fill="#81BC06"/>
            <rect x="2" y="17" width="13" height="13" fill="#05A6F0"/>
            <rect x="17" y="17" width="13" height="13" fill="#FFBA08"/>
          </svg>
        </span>
        <span class="brand-logo" aria-label="Adobe">
          <svg viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <rect width="32" height="32" rx="6" fill="#FA0F00"/>
            <path d="M9 8h5l5 16h-4l-1.2-3.5h-4.6L8 24H4z M11.5 13.5l-1.5 4.5h3z" fill="#FFFFFF"/>
          </svg>
        </span>
        <span class="brand-logo" aria-label="Canva">
          <svg viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <defs>
              <linearGradient id="canva" x1="0" y1="0" x2="1" y2="1">
                <stop offset="0%" stop-color="#7D2AE7"/>
                <stop offset="40%" stop-color="#00C4CC"/>
                <stop offset="100%" stop-color="#01F0B0"/>
              </linearGradient>
            </defs>
            <circle cx="16" cy="16" r="14" fill="url(#canva)"/>
            <text x="16" y="22" font-family="Inter, sans-serif" font-size="16" font-weight="900" text-anchor="middle" fill="#fff">C</text>
          </svg>
        </span>
        <span class="brand-logo" aria-label="ChatGPT Plus">
          <svg viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <circle cx="16" cy="16" r="14" fill="#10A37F"/>
            <text x="16" y="22" font-family="Inter, sans-serif" font-size="14" font-weight="800" text-anchor="middle" fill="#fff">AI</text>
          </svg>
        </span>
      {% endfor %}
    </div>
  </div>
</section>

<style>
  .brand-logo {
    display: inline-flex;
    align-items: center;
    height: 32px;
    flex-shrink: 0;
    opacity: 0.7;
    transition: opacity 0.2s;
    filter: grayscale(0.05);
  }
  .brand-logo:hover { opacity: 1; }
  .brand-logo svg { height: 100%; width: auto; }
  .brand-strip { mask-image: linear-gradient(90deg, transparent, #000 8%, #000 92%, transparent); -webkit-mask-image: linear-gradient(90deg, transparent, #000 8%, #000 92%, transparent); }
  @keyframes brandTicker { from { transform: translateX(0) } to { transform: translateX(-50%) } }
</style>
