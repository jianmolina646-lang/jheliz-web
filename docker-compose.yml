version: "3.9"

services:
  web:
    build: .
    command: >
      bash -c "python manage.py migrate --noinput &&
               python manage.py collectstatic --noinput &&
               gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 3"
    env_file: .env
    volumes:
      - ./media:/app/media
      - ./staticfiles:/app/staticfiles
    ports:
      - "8000:8000"
    depends_on:
      - db
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: jheliz
      POSTGRES_PASSWORD: jheliz
      POSTGRES_DB: jheliz
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  telegram_bot:
    build: .
    command: python manage.py run_telegram_bot
    env_file: .env
    depends_on:
      - web
    restart: unless-stopped
    profiles:
      - bot  # Inicia solo con: docker compose --profile bot up

volumes:
  postgres_data:
