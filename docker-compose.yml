services:
  web:
    build: .
    # Gunicorn:
    # - 3 workers + 4 threads (gthread): 12 reqs concurrentes; con --preload los
    #   workers comparten memoria del master, así que 3 workers caben en 2GB RAM
    #   sin estresar al sistema. Si un worker se cuelga en una query lenta del
    #   admin, los otros 2 siguen sirviendo y nginx no tira 504.
    # - --timeout 30: mata workers atascados a los 30s (default explícito).
    # - --graceful-timeout 10: tras SIGTERM espera solo 10s antes de SIGKILL.
    # - --preload: carga el código una vez en master, fork() en workers (ahorra RAM).
    # - --keep-alive 5: nginx reusa la conexión a gunicorn, evita TCP handshake.
    # - --max-requests + jitter: recicla workers cada ~1k requests (evita memory leaks).
    command: ["bash", "-c", "python manage.py migrate --noinput && python manage.py collectstatic --noinput && gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 3 --threads 4 --worker-class gthread --preload --timeout 30 --graceful-timeout 10 --keep-alive 5 --max-requests 1000 --max-requests-jitter 100 --access-logfile - --error-logfile -"]
    env_file: .env
    volumes:
      - ./media:/app/media
      - ./staticfiles:/app/staticfiles
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS -o /dev/null http://localhost:8000/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 60s

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: jheliz
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-jheliz}
      POSTGRES_DB: jheliz
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jheliz"]
      interval: 5s
      timeout: 5s
      retries: 10

  telegram_bot:
    build: .
    command: python manage.py run_telegram_bot
    env_file: .env
    depends_on:
      - web
    restart: unless-stopped
    profiles:
      - bot  # Inicia solo con: docker compose --profile bot up

  codes_bot:
    build: .
    command: python manage.py run_codes_bot
    env_file: .env
    depends_on:
      - web
    restart: unless-stopped
    profiles:
      - bot  # Inicia junto al resto con: docker compose --profile bot up

  disney_bot:
    build: .
    command: python manage.py run_disney_bot
    env_file: .env
    depends_on:
      - web
    restart: unless-stopped
    profiles:
      - bot  # Inicia junto al resto con: docker compose --profile bot up

volumes:
  postgres_data:
