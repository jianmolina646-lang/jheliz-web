version: "3.9"

services:
  web:
    build: .
    # Gunicorn:
    # - 2 workers + 4 threads (gthread) en VPS de 1 CPU: 8 reqs concurrentes vs 3 antes,
    #   sin que se serialicen requests bajo carga (sync con 1 CPU se serializa).
    # - --preload: carga el código una vez en master, fork() en workers (ahorra RAM).
    # - --keepalive 5: nginx reusa la conexión a gunicorn, evita TCP handshake.
    # - --max-requests + jitter: recicla workers cada ~1k requests (evita memory leaks).
    command: >
      bash -c "python manage.py migrate --noinput &&
               python manage.py collectstatic --noinput &&
               gunicorn config.wsgi:application --bind 0.0.0.0:8000
               --workers 2 --threads 4 --worker-class gthread --preload
               --keepalive 5 --max-requests 1000 --max-requests-jitter 100
               --access-logfile - --error-logfile -"
    env_file: .env
    volumes:
      - ./media:/app/media
      - ./staticfiles:/app/staticfiles
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS -o /dev/null http://localhost:8000/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 60s

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: jheliz
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-jheliz}
      POSTGRES_DB: jheliz
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jheliz"]
      interval: 5s
      timeout: 5s
      retries: 10

  telegram_bot:
    build: .
    command: python manage.py run_telegram_bot
    env_file: .env
    depends_on:
      - web
    restart: unless-stopped
    profiles:
      - bot  # Inicia solo con: docker compose --profile bot up

volumes:
  postgres_data:
