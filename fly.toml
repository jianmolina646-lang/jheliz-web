# Fly.io config para Jheliz
app = "jheliz-web"
primary_region = "gig"  # São Paulo (cercano a Perú)

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8000"
  DEBUG = "False"
  SITE_URL = "https://jhelizservicestv.es"
  ALLOWED_HOSTS = "jhelizservicestv.es,www.jhelizservicestv.es,jheliz-web.fly.dev"
  DJANGO_SETTINGS_MODULE = "config.settings"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 1

[[http_service.checks]]
  grace_period = "10s"
  interval = "30s"
  method = "GET"
  path = "/"
  timeout = "5s"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory = "512mb"

[deploy]
  release_command = "python manage.py migrate --noinput"

[[mounts]]
  source = "jheliz_data"
  destination = "/app/data"
