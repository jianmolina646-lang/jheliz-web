name: Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: deploy-vps
  cancel-in-progress: false

jobs:
  deploy:
    name: SSH + git pull + docker compose
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          script_stop: true
          # Forwardea estos env vars al shell remoto; se usan en el script.
          envs: VPS_PROJECT_PATH,MERCADOPAGO_WEBHOOK_SECRET,NGINX_CONF_SYNC,NGINX_CONF_PATH
          script: |
            set -euo pipefail
            PROJECT_PATH="${VPS_PROJECT_PATH:-/srv/jheliz}"
            cd "$PROJECT_PATH"

            # Sincroniza MERCADOPAGO_WEBHOOK_SECRET al .env de manera idempotente.
            # El valor viene del GitHub Actions secret. Si está vacío,
            # no toca el archivo (no rompe deploys cuando todavía no se
            # configuró el secret en GitHub).
            if [ -n "${MERCADOPAGO_WEBHOOK_SECRET:-}" ]; then
              echo "→ Sincronizando MERCADOPAGO_WEBHOOK_SECRET al .env..."
              ENV_FILE=".env"
              touch "$ENV_FILE"
              # Reemplazo seguro: filtramos la línea anterior (si hay) y
              # appendeamos el valor nuevo. Evitamos sed -i para no tener
              # que escapar caracteres especiales en el secreto.
              umask 077
              grep -v '^MERCADOPAGO_WEBHOOK_SECRET=' "$ENV_FILE" > "$ENV_FILE.tmp" || true
              echo "MERCADOPAGO_WEBHOOK_SECRET=${MERCADOPAGO_WEBHOOK_SECRET}" >> "$ENV_FILE.tmp"
              mv "$ENV_FILE.tmp" "$ENV_FILE"
            fi

            echo "→ Pulling latest from main..."
            git fetch --all --prune
            git checkout main
            git pull --ff-only origin main

            echo "→ Rebuilding y arrancando con --wait (falla si web no llega a healthy en 4 min)..."
            # `migrate` y `collectstatic` se ejecutan en el CMD del container `web`
            # antes de arrancar gunicorn (ver docker-compose.yml). El healthcheck
            # del servicio web hace curl a /, así que si las migraciones fallan
            # gunicorn no arranca, el container no llega a `healthy` y `up --wait`
            # devuelve no-cero — lo que hace que este step (con `set -e`) aborte
            # el workflow y la run quede roja en GitHub Actions.
            docker compose pull || true
            if ! docker compose up -d --build --wait --wait-timeout 240; then
              echo "✗ Deploy abortado: web no llegó a estado healthy."
              docker compose ps
              echo "--- logs de web (últimas 80 líneas) ---"
              docker compose logs --tail=80 web || true
              exit 1
            fi

            echo "→ Smoke test público..."
            if ! curl -fsS -o /dev/null --max-time 10 http://localhost:8000/; then
              echo "✗ Smoke test falló."
              docker compose logs --tail=50 web || true
              exit 1
            fi

            # ----------------------------------------------------------------
            # Sincronización idempotente de la config de nginx.
            #
            # Activado solo si la variable de repo NGINX_CONF_SYNC es "true".
            # Renderiza deploy/nginx.conf.example sustituyendo ${PROJECT_PATH}
            # vía envsubst y, si difiere del archivo en NGINX_CONF_PATH (default
            # /etc/nginx/sites-available/jheliz), hace backup, valida con
            # `nginx -t` y recarga nginx. Si nginx -t falla, restaura el backup
            # y aborta el deploy. El usuario SSH debe tener sudo NOPASSWD para
            # `nginx`, `cp` y `systemctl reload nginx`.
            # ----------------------------------------------------------------
            if [ "${NGINX_CONF_SYNC:-false}" = "true" ]; then
              NGINX_CONF="${NGINX_CONF_PATH:-/etc/nginx/sites-available/jheliz}"
              echo "→ Sincronizando nginx config en $NGINX_CONF..."

              if ! command -v envsubst >/dev/null 2>&1; then
                echo "✗ envsubst no instalado. Corre: sudo apt-get install -y gettext-base"
                exit 1
              fi
              if ! sudo -n true 2>/dev/null; then
                echo "✗ El usuario SSH no tiene sudo NOPASSWD configurado."
                echo "  Agrega en /etc/sudoers.d/jheliz-deploy:"
                echo "    ${USER:-deploy} ALL=(root) NOPASSWD: /usr/sbin/nginx, /bin/cp, /bin/systemctl reload nginx"
                exit 1
              fi
              if [ ! -f "$NGINX_CONF" ]; then
                echo "✗ $NGINX_CONF no existe. Aplica la config manualmente la primera vez (DEPLOY.md §1.4) y luego activa NGINX_CONF_SYNC."
                exit 1
              fi

              DESIRED="$(mktemp /tmp/jheliz-nginx.XXXXXX)"
              trap 'rm -f "$DESIRED"' EXIT
              PROJECT_PATH="$PROJECT_PATH" envsubst '${PROJECT_PATH}' \
                < deploy/nginx.conf.example > "$DESIRED"

              if diff -q "$NGINX_CONF" "$DESIRED" >/dev/null 2>&1; then
                echo "→ Config nginx ya está al día (sin diferencias)."
              else
                echo "→ Diferencias detectadas:"
                diff -u "$NGINX_CONF" "$DESIRED" || true

                BACKUP="${NGINX_CONF}.bak.$(date +%s)"
                sudo cp -p "$NGINX_CONF" "$BACKUP"
                sudo cp "$DESIRED" "$NGINX_CONF"

                if ! sudo nginx -t; then
                  echo "✗ nginx -t falló. Restaurando $BACKUP."
                  sudo cp "$BACKUP" "$NGINX_CONF"
                  exit 1
                fi

                sudo systemctl reload nginx
                echo "✓ nginx recargado. Backup en $BACKUP."
              fi
            fi

            echo "✓ Deploy completado: $(git rev-parse --short HEAD)"
        env:
          VPS_PROJECT_PATH: ${{ vars.VPS_PROJECT_PATH }}
          NGINX_CONF_SYNC: ${{ vars.NGINX_CONF_SYNC }}
          NGINX_CONF_PATH: ${{ vars.NGINX_CONF_PATH }}
          MERCADOPAGO_WEBHOOK_SECRET: ${{ secrets.MERCADOPAGO_WEBHOOK_SECRET }}
