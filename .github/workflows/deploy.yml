name: Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: deploy-vps
  cancel-in-progress: false

jobs:
  deploy:
    name: SSH + git pull + docker compose
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          script_stop: true
          # Forwardea estos env vars al shell remoto; se usan en el script.
          envs: VPS_PROJECT_PATH,MERCADOPAGO_WEBHOOK_SECRET
          script: |
            set -euo pipefail
            cd "${VPS_PROJECT_PATH:-/srv/jheliz}"

            # Sincroniza MERCADOPAGO_WEBHOOK_SECRET al .env de manera idempotente.
            # El valor viene del GitHub Actions secret. Si está vacío,
            # no toca el archivo (no rompe deploys cuando todavía no se
            # configuró el secret en GitHub).
            if [ -n "${MERCADOPAGO_WEBHOOK_SECRET:-}" ]; then
              echo "→ Sincronizando MERCADOPAGO_WEBHOOK_SECRET al .env..."
              ENV_FILE=".env"
              touch "$ENV_FILE"
              # Reemplazo seguro: filtramos la línea anterior (si hay) y
              # appendeamos el valor nuevo. Evitamos sed -i para no tener
              # que escapar caracteres especiales en el secreto.
              umask 077
              grep -v '^MERCADOPAGO_WEBHOOK_SECRET=' "$ENV_FILE" > "$ENV_FILE.tmp" || true
              echo "MERCADOPAGO_WEBHOOK_SECRET=${MERCADOPAGO_WEBHOOK_SECRET}" >> "$ENV_FILE.tmp"
              mv "$ENV_FILE.tmp" "$ENV_FILE"
            fi

            echo "→ Pulling latest from main..."
            git fetch --all --prune
            git checkout main
            git pull --ff-only origin main

            echo "→ Rebuilding y arrancando con --wait (falla si web no llega a healthy en 4 min)..."
            # `migrate` y `collectstatic` se ejecutan en el CMD del container `web`
            # antes de arrancar gunicorn (ver docker-compose.yml). El healthcheck
            # del servicio web hace curl a /, así que si las migraciones fallan
            # gunicorn no arranca, el container no llega a `healthy` y `up --wait`
            # devuelve no-cero — lo que hace que este step (con `set -e`) aborte
            # el workflow y la run quede roja en GitHub Actions.
            docker compose pull || true
            if ! docker compose up -d --build --wait --wait-timeout 240; then
              echo "✗ Deploy abortado: web no llegó a estado healthy."
              docker compose ps
              echo "--- logs de web (últimas 80 líneas) ---"
              docker compose logs --tail=80 web || true
              exit 1
            fi

            echo "→ Smoke test público..."
            if ! curl -fsS -o /dev/null --max-time 10 http://localhost:8000/; then
              echo "✗ Smoke test falló."
              docker compose logs --tail=50 web || true
              exit 1
            fi

            echo "✓ Deploy completado: $(git rev-parse --short HEAD)"
        env:
          VPS_PROJECT_PATH: ${{ vars.VPS_PROJECT_PATH }}
          MERCADOPAGO_WEBHOOK_SECRET: ${{ secrets.MERCADOPAGO_WEBHOOK_SECRET }}
